<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1280"/>
  <title>Seirios — Logo Intro</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #080c14;
      font-family: 'Courier New', monospace;
    }

    /* ── Background: subtle star field ── */
    .bg {
      position: absolute;
      inset: 0;
      background: #080c14;
      overflow: hidden;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #ffffff;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--op, 0.4); }
    }

    /* ── Subtle grid lines ── */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,224,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,224,255,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0;
      animation: gridFadeIn 1s ease 0.5s forwards;
    }
    @keyframes gridFadeIn {
      to { opacity: 1; }
    }

    /* ── Glow orb behind logo ── */
    .glow-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(24,95,186,0.22) 0%, transparent 70%);
      opacity: 0;
      animation: orbPulse 4s ease 1s infinite;
    }
    @keyframes orbPulse {
      0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    /* ── Centre stage ── */
    .centre {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Logo mark ── */
    .logo-mark-wrap {
      opacity: 0;
      transform: scale(0.6);
      animation: logoIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }
    @keyframes logoIn {
      to { opacity: 1; transform: scale(1); }
    }

    .logo-mark-svg {
      width: 96px;
      height: 96px;
      filter: drop-shadow(0 0 18px rgba(74,158,255,0.7)) drop-shadow(0 0 40px rgba(74,158,255,0.3));
      animation: logoGlow 3s ease-in-out 1.6s infinite;
    }
    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(74,158,255,0.7)) drop-shadow(0 0 40px rgba(74,158,255,0.25)); }
      50%       { filter: drop-shadow(0 0 28px rgba(74,158,255,1))   drop-shadow(0 0 60px rgba(74,158,255,0.5)); }
    }

    /* ── Brand name — mint green ── */
    .brand-name {
      opacity: 0;
      transform: translateY(12px);
      animation: nameIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 52px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #4a9eff;
      text-transform: uppercase;
    }
    @keyframes nameIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Horizontal rule ── */
    .rule {
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,158,255,0.6), transparent);
      animation: ruleExpand 0.8s ease 1.9s forwards;
    }
    @keyframes ruleExpand {
      to { width: 360px; }
    }

    /* ── Tagline — white ── */
    .tagline {
      opacity: 0;
      animation: tagIn 0.7s ease 2s forwards;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #ffffff;
      text-transform: uppercase;
    }
    @keyframes tagIn {
      to { opacity: 1; }
    }

    /* ── Corner accents ── */
    .corner {
      position: absolute;
      width: 32px;
      height: 32px;
      opacity: 0;
      animation: cornerIn 0.5s ease var(--cd, 2.2s) forwards;
    }
    @keyframes cornerIn { to { opacity: 0.4; } }

    .corner-tl { top: 48px; left: 48px; border-top: 1.5px solid #4a9eff; border-left: 1.5px solid #4a9eff; }
    .corner-tr { top: 48px; right: 48px; border-top: 1.5px solid #4a9eff; border-right: 1.5px solid #4a9eff; }
    .corner-bl { bottom: 48px; left: 48px; border-bottom: 1.5px solid #4a9eff; border-left: 1.5px solid #4a9eff; }
    .corner-br { bottom: 48px; right: 48px; border-bottom: 1.5px solid #4a9eff; border-right: 1.5px solid #4a9eff; }
    .corner-tl { --cd: 2.2s; }
    .corner-tr { --cd: 2.35s; }
    .corner-bl { --cd: 2.5s; }
    .corner-br { --cd: 2.65s; }

    /* ── Bottom data line ── */
    .data-line {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
      opacity: 0;
      animation: dataIn 0.6s ease 2.8s forwards;
    }
    @keyframes dataIn { to { opacity: 1; } }

    .data-item {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
    }
    .data-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(29,158,117,0.5);
    }

    /* ── Final fade out — starts at 13s, gone by 15s ── */
    .fade-out {
      position: absolute;
      inset: 0;
      background: #080c14;
      opacity: 0;
      pointer-events: none;
      animation: fadeOut 2s ease 13s forwards;
    }
    @keyframes fadeOut { to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg" id="bg"></div>
  <div class="grid"></div>
  <div class="glow-orb"></div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Centre: logo + name + tagline -->
  <div class="centre">

    <div class="logo-mark-wrap">
      <!-- Exact Concept A: open mark, two thin rings, thin cross, no background -->
      <svg class="logo-mark-svg" width="96" height="96" viewBox="0 0 32 32"
           xmlns="http://www.w3.org/2000/svg" aria-label="Seirios">
        <!-- Outer glow rings -->
        <circle cx="16" cy="16" r="14" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>
        <circle cx="16" cy="16" r="10" fill="none" stroke="#4a9eff" stroke-width="0.5" opacity="0.2"/>
        <!-- 8-point star cross — thin, opacity 0.5 per Concept A -->
        <line x1="8.5" y1="16" x2="23.5" y2="16" stroke="#4a9eff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
        <line x1="16" y1="8.5" x2="16" y2="23.5" stroke="#4a9eff" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
        <!-- Diagonals (shorter, thinner) -->
        <line x1="11.2" y1="11.2" x2="20.8" y2="20.8" stroke="#4a9eff" stroke-width="0.6" stroke-linecap="round" opacity="0.35"/>
        <line x1="20.8" y1="11.2" x2="11.2" y2="20.8" stroke="#4a9eff" stroke-width="0.6" stroke-linecap="round" opacity="0.35"/>
        <!-- Core -->
        <circle cx="16" cy="16" r="2.5" fill="#1a3d6e" stroke="#4a9eff" stroke-width="0.25" opacity="0.9"/>
        <circle cx="16" cy="16" r="1" fill="#8bc4ff"/>
        <circle cx="16" cy="16" r="0.4" fill="#ffffff"/>
        <!-- Tick -->
        <path d="M15.2 16 L15.8 16.6 L17 15.3" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="brand-name">Seirios</div>
    <div class="rule"></div>
    <div class="tagline">AI you can prove</div>

  </div>

  <!-- Bottom data strip -->
  <div class="data-line">
    <span class="data-item">Seirios B.V.</span>
    <div class="data-dot"></div>
    <span class="data-item">Amsterdam</span>
    <div class="data-dot"></div>
    <span class="data-item">seirios.ai</span>
    <div class="data-dot"></div>
    <span class="data-item">EU AI Act · GDPR · NIST</span>
  </div>

  <!-- Fade to black at 13s -->
  <div class="fade-out"></div>

  <script>
    // Generate 80 random stars
    var bg = document.getElementById('bg');
    for (var i = 0; i < 80; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var size = Math.random() * 2 + 0.5;
      s.style.cssText = [
        'width:'   + size + 'px',
        'height:'  + size + 'px',
        'left:'    + (Math.random() * 1280) + 'px',
        'top:'     + (Math.random() * 720)  + 'px',
        '--d:'     + (2 + Math.random() * 4) + 's',
        '--delay:' + (Math.random() * 4)     + 's',
        '--op:'    + (0.2 + Math.random() * 0.5)
      ].join(';');
      bg.appendChild(s);
    }
  </script>

</body>
</html>
